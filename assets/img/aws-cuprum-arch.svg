<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Segoe UI','Inter',Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b0d17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="vpcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22d3ee"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="700" letter-spacing="0.5">☁ AFP Cuprum — Arquitectura Cloud AWS — Reforma Previsional</text>
  <text x="600" y="62" text-anchor="middle" fill="#8b92a5" font-size="12">Migración y desarrollo de servicios serverless · Python · IaC · Data Pipeline</text>

  <!-- ══════ VPC BOUNDARY ══════ -->
  <rect x="300" y="240" width="580" height="360" rx="14" fill="url(#vpcGrad)" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="316" y="265" fill="#60a5fa" font-size="11" font-weight="600">Amazon VPC</text>

  <!-- ══════ CI/CD ZONE (top-left) ══════ -->
  <rect x="30" y="80" width="220" height="140" rx="10" fill="#161b26" stroke="#1e2330" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="103" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">CI / CD Pipeline</text>
  <!-- GitHub Actions -->
  <rect x="48" y="115" width="84" height="40" rx="6" fill="#1c2333" stroke="#6366f1" stroke-width="1"/>
  <text x="90" y="132" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">GitHub</text>
  <text x="90" y="146" text-anchor="middle" fill="#a5b4fc" font-size="8">Actions</text>
  <!-- GitLab CI -->
  <rect x="148" y="115" width="84" height="40" rx="6" fill="#1c2333" stroke="#f97316" stroke-width="1"/>
  <text x="190" y="132" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">GitLab CI</text>
  <text x="190" y="146" text-anchor="middle" fill="#fdba74" font-size="8">Pipelines</text>
  <!-- Docker / K8s -->
  <rect x="48" y="165" width="84" height="36" rx="6" fill="#1c2333" stroke="#22d3ee" stroke-width="1"/>
  <text x="90" y="183" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="600">Docker</text>
  <text x="90" y="195" text-anchor="middle" fill="#67e8f9" font-size="7">Containers</text>
  <rect x="148" y="165" width="84" height="36" rx="6" fill="#1c2333" stroke="#38bdf8" stroke-width="1"/>
  <text x="190" y="183" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600">Kubernetes</text>
  <text x="190" y="195" text-anchor="middle" fill="#7dd3fc" font-size="7">Orchestration</text>

  <!-- ══════ IaC ZONE (top-right) ══════ -->
  <rect x="950" y="80" width="220" height="130" rx="10" fill="#161b26" stroke="#1e2330" stroke-width="1" filter="url(#shadow)"/>
  <text x="1060" y="103" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Infrastructure as Code</text>
  <rect x="968" y="115" width="84" height="40" rx="6" fill="#1c2333" stroke="#f59e0b" stroke-width="1"/>
  <text x="1010" y="133" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">CloudFormation</text>
  <text x="1010" y="147" text-anchor="middle" fill="#fcd34d" font-size="8">Stacks</text>
  <rect x="1068" y="115" width="84" height="40" rx="6" fill="#1c2333" stroke="#f59e0b" stroke-width="1"/>
  <text x="1110" y="133" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">AWS CDK</text>
  <text x="1110" y="147" text-anchor="middle" fill="#fcd34d" font-size="8">Python</text>
  <rect x="1008" y="165" width="84" height="30" rx="6" fill="#1c2333" stroke="#a78bfa" stroke-width="1"/>
  <text x="1050" y="185" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">Python IaC</text>

  <!-- ══════ CLOUDFRONT + USERS (top center) ══════ -->
  <!-- User -->
  <rect x="380" y="85" width="100" height="44" rx="8" fill="#1c2333" stroke="#8b92a5" stroke-width="1" filter="url(#shadow)"/>
  <text x="430" y="105" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">👤 Usuarios</text>
  <text x="430" y="120" text-anchor="middle" fill="#8b92a5" font-size="8">AFP Cuprum</text>

  <!-- CloudFront -->
  <rect x="530" y="85" width="120" height="44" rx="8" fill="#1c2333" stroke="#a78bfa" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="105" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">CloudFront</text>
  <text x="590" y="120" text-anchor="middle" fill="#c4b5fd" font-size="8">CDN / Edge</text>

  <!-- API Gateway -->
  <rect x="700" y="85" width="120" height="44" rx="8" fill="#1c2333" stroke="#f472b6" stroke-width="1" filter="url(#shadow)"/>
  <text x="760" y="105" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">API Gateway</text>
  <text x="760" y="120" text-anchor="middle" fill="#f9a8d4" font-size="8">REST API</text>

  <!-- ══════ ARROWS: Users → CloudFront → API GW ══════ -->
  <line x1="480" y1="107" x2="528" y2="107" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="650" y1="107" x2="698" y2="107" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

