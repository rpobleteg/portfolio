  <!-- RDS -->
  <rect x="320" y="400" width="130" height="56" rx="8" fill="#1c2333" stroke="#4ade80" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="385" y="424" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Amazon RDS</text>
  <text x="385" y="441" text-anchor="middle" fill="#86efac" font-size="9">PostgreSQL</text>

  <!-- DynamoDB -->
  <rect x="480" y="400" width="130" height="56" rx="8" fill="#1c2333" stroke="#4ade80" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="545" y="424" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">DynamoDB</text>
  <text x="545" y="441" text-anchor="middle" fill="#86efac" font-size="9">NoSQL · Key-Value</text>

  <!-- S3 Buckets -->
  <rect x="640" y="400" width="130" height="56" rx="8" fill="#1c2333" stroke="#4ade80" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="705" y="424" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Amazon S3</text>
  <text x="705" y="441" text-anchor="middle" fill="#86efac" font-size="9">Data Lake / Assets</text>

  <!-- Arrows Lambda → DBs -->
  <line x1="590" y1="348" x2="390" y2="398" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrowGreen)"/>
  <line x1="630" y1="348" x2="545" y2="398" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrowGreen)"/>
  <line x1="665" y1="348" x2="700" y2="398" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrowGreen)"/>

  <!-- ══════ AWS GLUE + ATHENA + PySpark (bottom center) ══════ -->
  <rect x="310" y="510" width="160" height="56" rx="8" fill="#1c2333" stroke="#22d3ee" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="390" y="534" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">AWS Glue</text>
  <text x="390" y="551" text-anchor="middle" fill="#67e8f9" font-size="9">ETL · PySpark Jobs</text>

  <rect x="510" y="510" width="160" height="56" rx="8" fill="#1c2333" stroke="#22d3ee" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="590" y="534" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Amazon Athena</text>
  <text x="590" y="551" text-anchor="middle" fill="#67e8f9" font-size="9">Queries SQL · S3</text>

  <rect x="710" y="510" width="130" height="56" rx="8" fill="#1c2333" stroke="#a78bfa" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="775" y="534" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">PySpark</text>
  <text x="775" y="551" text-anchor="middle" fill="#c4b5fd" font-size="9">Data Processing</text>

  <!-- Arrows S3 → Glue, S3 → Athena -->
  <line x1="680" y1="458" x2="430" y2="508" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrowCyan)"/>
  <line x1="705" y1="458" x2="590" y2="508" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrowCyan)"/>
  <line x1="730" y1="458" x2="745" y2="508" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrowCyan)"/>

  <!-- ══════ FLOW LABELS ══════ -->
  <!-- CI/CD → VPC arrow -->
  <path d="M250,170 Q280,220 340,260" stroke="#6366f1" stroke-width="1.3" fill="none" stroke-dasharray="6 3" marker-end="url(#arrowOrange)"/>
  <text x="270" y="228" fill="#a5b4fc" font-size="8" transform="rotate(-30,270,228)">Deploy</text>

  <!-- IaC → VPC arrow -->
  <path d="M950,170 Q920,220 850,260" stroke="#f59e0b" stroke-width="1.3" fill="none" stroke-dasharray="6 3" marker-end="url(#arrowOrange)"/>
  <text x="920" y="225" fill="#fcd34d" font-size="8" transform="rotate(30,920,225)">Provisioning</text>

  <!-- ══════ LEGEND ══════ -->
  <rect x="30" y="680" width="1140" height="110" rx="10" fill="#0f1219" stroke="#1e2330" stroke-width="1"/>
  <text x="60" y="705" fill="#8b92a5" font-size="11" font-weight="600">TECNOLOGÍAS UTILIZADAS</text>

  <!-- Row 1 -->
  <rect x="60" y="718" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="78" y="728" fill="#e2e8f0" font-size="10">Lambda · Step Functions · API Gateway</text>

  <rect x="340" y="718" width="10" height="10" rx="2" fill="#4ade80"/>
  <text x="358" y="728" fill="#e2e8f0" font-size="10">S3 · RDS · DynamoDB</text>

  <rect x="560" y="718" width="10" height="10" rx="2" fill="#22d3ee"/>
  <text x="578" y="728" fill="#e2e8f0" font-size="10">Glue · Athena · PySpark</text>

  <rect x="790" y="718" width="10" height="10" rx="2" fill="#a78bfa"/>
  <text x="808" y="728" fill="#e2e8f0" font-size="10">CloudFront · CloudFormation · CDK</text>

  <!-- Row 2 -->
  <rect x="60" y="746" width="10" height="10" rx="2" fill="#6366f1"/>
  <text x="78" y="756" fill="#e2e8f0" font-size="10">GitHub Actions · GitLab CI</text>

  <rect x="340" y="746" width="10" height="10" rx="2" fill="#38bdf8"/>
  <text x="358" y="756" fill="#e2e8f0" font-size="10">Docker · Kubernetes</text>

  <rect x="560" y="746" width="10" height="10" rx="2" fill="#f472b6"/>
  <text x="578" y="756" fill="#e2e8f0" font-size="10">VPC · Networking · Security</text>

  <rect x="790" y="746" width="10" height="10" rx="2" fill="#fbbf24"/>
  <text x="808" y="756" fill="#e2e8f0" font-size="10">Python 3.12 · Reforma Previsional</text>

  <!-- Bottom line -->
  <text x="600" y="776" text-anchor="middle" fill="#4b5563" font-size="9">© 2026 Ricardo Poblete · AFP Cuprum · BC Tecnología · Arquitectura de Referencia (Mock)</text>
</svg>