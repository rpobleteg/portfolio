  <line x1="760" y1="131" x2="760" y2="170" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ══════ INSIDE VPC ══════ -->

  <!-- Step Functions -->
  <rect x="320" y="280" width="160" height="56" rx="8" fill="#1c2333" stroke="#f472b6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="400" y="304" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Step Functions</text>
  <text x="400" y="322" text-anchor="middle" fill="#f9a8d4" font-size="9">Orquestación de workflows</text>

  <!-- Lambda cluster -->
  <rect x="540" y="270" width="180" height="76" rx="8" fill="#1c2333" stroke="#f59e0b" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="630" y="294" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">AWS Lambda</text>
  <text x="630" y="310" text-anchor="middle" fill="#fcd34d" font-size="9">Python 3.12 · Microservicios</text>
  <rect x="555" y="318" width="52" height="22" rx="4" fill="#1a1f2e" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="581" y="333" text-anchor="middle" fill="#fcd34d" font-size="7">fn-1</text>
  <rect x="614" y="318" width="52" height="22" rx="4" fill="#1a1f2e" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="640" y="333" text-anchor="middle" fill="#fcd34d" font-size="7">fn-2</text>
  <rect x="673" y="318" width="32" height="22" rx="4" fill="#1a1f2e" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="689" y="333" text-anchor="middle" fill="#fcd34d" font-size="7">…</text>

  <!-- Arrow: StepFunctions → Lambda -->
  <line x1="480" y1="308" x2="538" y2="308" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Arrow: API GW → Lambda (vertical) -->
  <rect x="751" y="170" width="0" height="0" fill="none"/>
  <path d="M760,131 L760,172 Q760,182 750,182 L720,182 Q710,182 710,192 L710,230 Q710,240 700,240 L660,268" stroke="#f59e0b" stroke-width="1.2" fill="none" marker-end="url(#arrowOrange)"/>

